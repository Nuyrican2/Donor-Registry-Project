{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>Log in</h1>
  <form method="post">
    <label>Email
      <input name="email" type="email" required>
    </label>
    <label>Password
      <input name="password" type="password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
  <p class="muted">First time here? <a href="{{ url_for('auth.register') }}">Create an account with your donor ID</a></p>
</section>
{% endblock %}
